name: Unit tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements_dev.txt
      - name: Run unit tests
        run: python -m pytest tests
